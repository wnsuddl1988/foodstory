name: Scheduled Cloudflare Deploy

on:
  schedule:
    # 매시간 7분에 실행 (정각 회피 — GitHub Actions 정각 부하 집중 이슈 우회)
    # UTC 00:07 = KST 09:07, UTC 01:07 = KST 10:07, ...
    - cron: '7 * * * *'
  push:
    branches:
      - master
  workflow_dispatch: # 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Build
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}")
          echo "Cloudflare deploy hook response: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "ERROR: Deploy hook failed with status $RESPONSE"
            exit 1
          fi
          echo "Deploy triggered successfully"
